{% extends 'base.html' %}
{% block content %}
<div class="card" style="text-align: left; max-width: 600px; margin: 0 auto;">
    <h2>Book Appointment</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Patient</label>
            <select name="patient" required>
                {% for patient in patients %}
                <option value="{{ patient.id }}">{{ patient.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Doctor</label>
            <select name="doctor" required>
                {% for doctor in doctors %}
                <option value="{{ doctor.id }}">Dr. {{ doctor.name }} ({{ doctor.specialization }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Date & Time</label>
            <input type="datetime-local" name="date" required>
        </div>
        <button type="submit" style="padding: 10px 20px; background: var(--success); color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%;">Book Appointment</button>
    </form>
</div>
{% endblock %}
