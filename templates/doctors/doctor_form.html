{% extends 'base.html' %}
{% block content %}
<div class="card" style="text-align: left; max-width: 600px; margin: 0 auto;">
    <h2>Add New Doctor</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Specialization</label>
            <input type="text" name="specialization" required>
        </div>
        <div class="form-group">
            <label>Availability (e.g. Mon-Fri 9AM-5PM)</label>
            <input type="text" name="availability" required>
        </div>
        <button type="submit" style="padding: 10px 20px; background: var(--soft-green); color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%;">Save Doctor</button>
    </form>
</div>
{% endblock %}
