{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto;">
    <h2>Confirm Delete</h2>
    <p>Are you sure you want to delete patient "{{ patient.name }}"?</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" style="padding: 10px 20px; background: var(--error); color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px;">Yes, Delete</button>
        <a href="{% url 'patient_list' %}" style="text-decoration: none; color: var(--primary-color);">Cancel</a>
    </form>
</div>
{% endblock %}
