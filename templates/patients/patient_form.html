{% extends 'base.html' %}
{% block content %}
<div class="card" style="text-align: left; max-width: 600px; margin: 0 auto;">
    <h2>Add New Patient</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" required>
        </div>
        <div class="form-group">
            <label>Gender</label>
            <select name="gender" required>
                <option value="M">Male</option>
                <option value="F">Female</option>
                <option value="O">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Contact</label>
            <input type="text" name="contact" required>
        </div>
        <div class="form-group">
            <label>Medical History</label>
            <textarea name="medical_history" rows="4"></textarea>
        </div>
        <button type="submit" style="padding: 10px 20px; background: var(--success); color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%;">Save Patient</button>
    </form>
</div>
{% endblock %}
